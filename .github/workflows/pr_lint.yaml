name: Lint and Test PlaidCloud Configuration
on:
  pull_request:
    branches:
      - master
jobs:
  reviewdog:
    name: Lint PlaidCloud Config w ReviewDog
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ensure python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Acquire list of changed python files
        id: all-python-files
        continue-on-error: true
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.py
      - name: Install dependencies
        run: pip install pyyaml requests setuptools pytest; pip install -q pylint==${{ secrets.PYLINT_VERSION }};
      - name: Install ReviewDog
        uses: reviewdog/action-setup@v1
      - name: Check Lint Warnings
        if: ${{ steps.all-python-files.outputs.any_changed == 'true' }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ${{ steps.all-python-files.outputs.all_changed_files }}
          pylint -s n -f text -d E,R,C ${{ steps.all-python-files.outputs.all_changed_files }} 2>&1 | reviewdog -efm="%f:%l:%c: %m" -name="PyLint Warnings" -reporter=github-check -level=warning
      - name: Check Lint Errors
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pylint -s n -f text -E python 2>&1 | reviewdog -efm="%f:%l:%c: %m" -name="PyLint Errors" -reporter=github-check -filter-mode=nofilter -fail-on-error
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Ensure python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[test]"
      - name: Run pytest with coverage
        working-directory: python
        run: |
          pytest tests/ -v \
            --cov=plaidcloud.config \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml
      - name: Test Results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: python/test-results.xml
          check_name: Test Results
      - name: Pytest Coverage Comment
        if: always()
        uses: MishaKav/pytest-coverage-comment@v1.7.1
        with:
          pytest-xml-coverage-path: python/coverage.xml
          junitxml-path: python/test-results.xml
